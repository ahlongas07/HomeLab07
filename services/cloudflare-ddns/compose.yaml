services:
  cloudflare-ddns:
    image: favonia/cloudflare-ddns:1
    container_name: homelab07-cloudflare-ddns
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${HOMELAB07_PRIVATE_ROOT:?HOMELAB07_PRIVATE_ROOT is required}/secrets/cloudflare-ddns-api-token:/run/secrets/cloudflare_api_token:ro
    environment:
      CLOUDFLARE_API_TOKEN_FILE: ${CLOUDFLARE_API_TOKEN_FILE:-/run/secrets/cloudflare_api_token}
      DOMAINS: ${CLOUDFLARE_DDNS_DOMAINS:?CLOUDFLARE_DDNS_DOMAINS is required}
      PROXIED: ${CLOUDFLARE_DDNS_PROXIED:-true}
      IP6_PROVIDER: ${CLOUDFLARE_DDNS_IP6_PROVIDER:-none}
      DETECTION_TIMEOUT: ${CLOUDFLARE_DDNS_DETECTION_TIMEOUT:-10s}
