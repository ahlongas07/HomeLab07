services:
  owncloud:
    image: owncloud/server:10.16.3
    container_name: homelab07-owncloud
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      OWNCLOUD_DOMAIN: ${OWNCLOUD_DOMAIN:?OWNCLOUD_DOMAIN is required}
      OWNCLOUD_TRUSTED_DOMAINS: ${OWNCLOUD_TRUSTED_DOMAINS:?OWNCLOUD_TRUSTED_DOMAINS is required}
      OWNCLOUD_DB_TYPE: mysql
      OWNCLOUD_DB_NAME: ${OWNCLOUD_DB_NAME:?OWNCLOUD_DB_NAME is required}
      OWNCLOUD_DB_USERNAME: ${OWNCLOUD_DB_USERNAME:?OWNCLOUD_DB_USERNAME is required}
      OWNCLOUD_DB_PASSWORD: ${OWNCLOUD_DB_PASSWORD:?OWNCLOUD_DB_PASSWORD is required}
      OWNCLOUD_DB_HOST: ${OWNCLOUD_DB_HOST:-homelab07-mariadb}
      OWNCLOUD_DB_PREFIX: ${OWNCLOUD_DB_PREFIX:-oc_}
      OWNCLOUD_ADMIN_USERNAME: ${OWNCLOUD_ADMIN_USERNAME:?OWNCLOUD_ADMIN_USERNAME is required}
      OWNCLOUD_ADMIN_PASSWORD: ${OWNCLOUD_ADMIN_PASSWORD:?OWNCLOUD_ADMIN_PASSWORD is required}
      OWNCLOUD_VOLUME_ROOT: ${OWNCLOUD_VOLUME_ROOT:-/mnt/data}
      OWNCLOUD_VOLUME_FILES: ${OWNCLOUD_VOLUME_FILES:-/mnt/data/files}
      OWNCLOUD_MYSQL_UTF8MB4: "true"
      OWNCLOUD_REDIS_ENABLED: "true"
      OWNCLOUD_REDIS_HOST: ${OWNCLOUD_REDIS_HOST:-homelab07-valkey}
      OWNCLOUD_OVERWRITE_CLI_URL: ${OWNCLOUD_OVERWRITE_CLI_URL:?OWNCLOUD_OVERWRITE_CLI_URL is required}
      OWNCLOUD_OVERWRITE_PROTOCOL: ${OWNCLOUD_OVERWRITE_PROTOCOL:-https}
      OWNCLOUD_TRUSTED_PROXIES: ${OWNCLOUD_TRUSTED_PROXIES:-homelab07-nginx-proxy-manager}
    volumes:
      - ${OWNCLOUD_DATA_ROOT:?OWNCLOUD_DATA_ROOT is required}:/mnt/data
      - ./theme-snowcone:/mnt/data/custom/theme-snowcone
    networks:
      - homelab07-internal
      - homelab07-proxy
    healthcheck:
      test: ["CMD", "/usr/bin/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

networks:
  homelab07-internal:
    name: homelab07-internal
    external: true
  homelab07-proxy:
    name: homelab07-proxy
    external: true
