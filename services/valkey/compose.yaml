services:
  valkey:
    image: valkey/valkey:8-alpine
    container_name: homelab07-valkey
    restart: unless-stopped
    user: "999:999"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    entrypoint:
      - valkey-server
    command:
      - --save
      - ""
      - --appendonly
      - "no"
      - --protected-mode
      - "no"
      - --maxmemory
      - "128mb"
      - --maxmemory-policy
      - noeviction
    tmpfs:
      - /data:rw,noexec,nosuid,nodev,size=64m,uid=999,gid=999,mode=1770
    networks:
      - homelab07-internal
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

networks:
  homelab07-internal:
    name: homelab07-internal
    external: true
