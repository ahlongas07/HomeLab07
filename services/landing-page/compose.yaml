services:
  landing-page:
    image: nginx:1.27-alpine
    container_name: homelab07-landing-page
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - homelab07-proxy

networks:
  homelab07-proxy:
    name: homelab07-proxy
    external: true
