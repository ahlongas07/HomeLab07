services:
  mariadb:
    image: mariadb:11.4
    container_name: homelab07-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD is required}
      MARIADB_DATABASE: ${MARIADB_DATABASE:?MARIADB_DATABASE is required}
      MARIADB_USER: ${MARIADB_USER:?MARIADB_USER is required}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD is required}
    volumes:
      - ${HOMELAB07_DATA_ROOT:?HOMELAB07_DATA_ROOT is required}/mariadb:/var/lib/mysql
    networks:
      - homelab07-internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  homelab07-internal:
    name: homelab07-internal
    internal: true
